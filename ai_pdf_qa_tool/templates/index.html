<!DOCTYPE html>
<html>
<head>
<title>AI PDF Q&A</title>
</head>

<body>

<h2>Upload PDF</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" required>
<button type="submit">Upload</button>
</form>

<hr>

<h2>Ask Question</h2>

<form action="/ask" method="post">
<input type="text" name="question" placeholder="Ask about the PDF" required>
<button type="submit">Ask</button>
</form>

{% if question %}
<h3>Question:</h3>
<p>{{ question }}</p>
{% endif %}

{% if answer %}
<h3>AI Answer:</h3>
<p>{{ answer }}</p>
{% endif %}

</body>
</html>
